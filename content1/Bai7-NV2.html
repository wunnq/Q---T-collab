<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đóng góp ý kiến</title>
    <style>
        body {
            font-family: Arial;
        }
        .box {
            width: 420px;
            border: 1px solid black;
            padding: 10px;
        }
        h3 {
            margin: 10px 0 5px;
        }
        input[type="text"], input[type="email"] {
            width: 200px;
        }
        textarea {
            width: 300px;
            height: 100px;
        }
        .btn {
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="box">
    <b>Đóng góp ý kiến cho thư viện của nhà trường</b>

    <form action="Bai7-NV3.html">
        <h3>1. Thông tin về người góp ý</h3>

        Họ và tên:
        <input type="text" name="hoten"><br><br>

        Địa chỉ email:
        <input type="email" name="email"><br>

        <h3>2. Đóng góp ý kiến</h3>

        Ý kiến đóng góp:<br>
        <textarea name="ykien"></textarea><br><br>

        Thể loại cần bổ sung thêm sách:<br>
        <input type="checkbox" name="chkTruyenNgan"> Truyện ngắn <br>
        <input type="checkbox" name="chkKiNang"> Kĩ năng sống <br>
        <input type="checkbox" name="chkCNTT"> Công nghệ thông tin <br>
        <input type="checkbox" name="chkTruyenTranh"> Truyện tranh <br>
        <input type="checkbox" name="chkLichSu"> Lịch sử <br>

        <input class="btn" type="submit" value="Góp ý">
    </form>
</div>

</body>
</html>
