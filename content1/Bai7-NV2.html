<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đóng góp ý kiến</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }
        .container {
            width: 420px;
            border: 1px solid black;
            padding: 20px;
        }
        h2 {
            text-align: center;
        }
        input, textarea {
            width: 100%;
            margin: 5px 0 10px 0;
            padding: 5px;
        }
        textarea {
            height: 100px;
        }
        .checkbox-group {
            margin: 10px 0;
        }
        button {
            padding: 6px 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Đóng góp ý kiến cho thư viện của nhà trường</h2>

    <form>
        <!-- Phần 1 -->
        <h3>1. Thông tin về người góp ý</h3>

        <label>Họ và tên:</label>
        <input type="text" name="hoten">

        <label>Địa chỉ email:</label>
        <input type="email" name="email">

        <!-- Phần 2 -->
        <h3>2. Đóng góp ý kiến</h3>

        <label>Ý kiến đóng góp:</label>
        <textarea name="ykien"></textarea>

        <!-- Checkbox -->
        <label>Thể loại cần bổ sung thêm sách:</label>
        <div class="checkbox-group">
            <input type="checkbox" name="chkTruyenNgan"> Truyện ngắn <br>
            <input type="checkbox" name="chkKiNang"> Kĩ năng sống <br>
            <input type="checkbox" name="chkCNTT"> Công nghệ thông tin <br>
            <input type="checkbox" name="chkTruyenTranh"> Truyện tranh <br>
            <input type="checkbox" name="chkLichSu"> Lịch sử <br>
        </div>

        <!-- Nút gửi -->
        <input type="submit" value="Góp ý">
    </form>
</div>

</body>
</html>
