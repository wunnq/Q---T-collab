<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đóng góp ý kiến</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }
        .container {
            width: 400px;
            border: 1px solid black;
            padding: 20px;
        }
        h2 {
            text-align: center;
        }
        input, textarea {
            width: 100%;
            margin: 5px 0 15px 0;
            padding: 5px;
        }
        textarea {
            height: 120px;
        }
        button {
            padding: 8px 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Đóng góp ý kiến cho thư viện của nhà trường</h2>

    <form>
        <h3>1. Thông tin về người góp ý</h3>

        <label>Họ và tên:</label>
        <input type="text" name="hoten">

        <label>Địa chỉ email:</label>
        <input type="email" name="email">

        <h3>2. Đóng góp ý kiến</h3>

        <label>Ý kiến đóng góp:</label>
        <textarea name="ykien"></textarea>

        <button type="submit">Gửi</button>
    </form>
</div>

</body>
</html>
